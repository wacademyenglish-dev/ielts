<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WOLF LABS | IELTS Listening Masterclass</title>
    
    <!-- Epic & Academic Typography -->
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;800;900&family=Inter:wght@300;400;600;700;800&family=Fira+Code:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* --- IELTS PRESTIGE THEME (OXFORD BLUE & GOLD) --- */
        :root {
            --bg: #03060d;
            --surface: rgba(10, 18, 35, 0.85);
            --surface-hover: rgba(212, 175, 55, 0.1);
            --border: rgba(212, 175, 55, 0.3);
            --accent: #D4AF37; /* Gold */
            --accent-glow: rgba(212, 175, 55, 0.4);
            --correct: #1DB954;
            --incorrect: #E50914; 
            --text-main: #FFFFFF;
            --text-dim: #A1A1AA;
            --font-display: 'Cinzel', serif;
            --font-body: 'Inter', sans-serif;
            --font-code: 'Fira Code', monospace;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--bg);
            background-image: radial-gradient(circle at 30% 20%, rgba(20, 35, 70, 0.4) 0%, rgba(3,6,13,1) 70%);
            color: var(--text-main);
            font-family: var(--font-body);
            line-height: 1.6;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* --- AMBIENT ORBS --- */
        .ambient-orbs { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 0; overflow: hidden; pointer-events: none; }
        .orb { position: absolute; border-radius: 50%; filter: blur(150px); opacity: 0.15; animation: floatOrb 20s infinite alternate ease-in-out; }
        .orb-1 { width: 600px; height: 600px; background: var(--accent); top: -20%; left: -10%; }
        .orb-2 { width: 500px; height: 500px; background: #002244; bottom: -20%; right: -10%; animation-delay: -5s; }
        @keyframes floatOrb { 0% { transform: translate(0, 0) scale(1); } 100% { transform: translate(50px, 50px) scale(1.1); } }

        /* --- HEADER & NAVIGATION --- */
        .header {
            position: fixed; top: 0; left: 0; right: 0; height: 80px; padding: 0 40px;
            background: linear-gradient(to bottom, rgba(3,6,13,0.95), transparent);
            backdrop-filter: blur(15px); border-bottom: 1px solid rgba(255,255,255,0.05);
            display: flex; align-items: center; justify-content: space-between; z-index: 100;
        }
        .logo { font-family: var(--font-display); font-weight: 900; font-size: 1.2rem; letter-spacing: 2px; color: #fff; }
        .logo span { color: var(--accent); }

        .nav-bar {
            position: fixed; bottom: 0; left: 0; right: 0; height: 100px; padding: 0 50px;
            background: linear-gradient(to top, rgba(3,6,13,1), rgba(3,6,13,0.8)); border-top: 1px solid rgba(255,255,255,0.05);
            display: flex; align-items: center; justify-content: space-between; z-index: 90; backdrop-filter: blur(20px);
        }

        .progress-container { position: absolute; bottom: 0; left: 0; width: 100%; height: 4px; background: rgba(255,255,255,0.05); }
        .progress-bar { height: 100%; width: 0%; background: var(--accent); transition: width 0.4s ease; box-shadow: 0 0 15px var(--accent-glow); }

        /* --- UI CONTROLS --- */
        .controls { display: flex; gap: 15px; }
        .icon-btn { background: rgba(255,255,255,0.05); border: 1px solid var(--border); color: var(--accent); width: 45px; height: 45px; border-radius: 8px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.3s; backdrop-filter: blur(10px); font-size: 1.2rem;}
        .icon-btn:hover { background: var(--accent); color: #000; transform: translateY(-2px); }

        .btn {
            padding: 16px 40px; border: none; border-radius: 8px; font-family: var(--font-display);
            font-size: 1.1rem; font-weight: 800; letter-spacing: 2px; text-transform: uppercase;
            cursor: pointer; transition: all 0.3s; display: inline-flex; align-items: center; gap: 10px;
            background: #fff; color: #000; box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }
        .btn-accent { background: var(--accent); color: #000; box-shadow: 0 10px 30px var(--accent-glow); }
        .btn:hover { transform: translateY(-3px); box-shadow: 0 15px 40px var(--accent-glow); }
        .btn:disabled { opacity: 0.3; pointer-events: none; }

        /* --- MAIN LAYOUT --- */
        main {
            flex: 1; width: 100%; max-width: 1000px; margin: 0 auto;
            padding-top: 100px; padding-bottom: 150px;
            display: flex; align-items: center; justify-content: center;
            position: relative; z-index: 10;
        }
        
        .step {
            position: absolute; width: 100%;
            opacity: 0; pointer-events: none; transform: scale(0.96);
            transition: all 0.5s cubic-bezier(0.25, 0.8, 0.25, 1);
            visibility: hidden; max-height: 80vh; overflow-y: auto; padding: 20px;
            scrollbar-width: thin; scrollbar-color: var(--accent) transparent;
        }
        .step::-webkit-scrollbar { width: 6px; }
        .step::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 10px; }
        .step.active { opacity: 1; pointer-events: auto; transform: scale(1); visibility: visible; position: relative; }

        /* --- GLASSMORPHISM PANELS --- */
        .glass-panel {
            background: linear-gradient(135deg, rgba(15,25,45,0.85) 0%, rgba(5,10,25,0.95) 100%);
            backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px);
            border: 1px solid var(--border); border-radius: 20px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.8), inset 0 1px 1px rgba(212, 175, 55, 0.15);
            padding: 50px; position: relative; width: 100%;
        }

        h1 { font-family: var(--font-display); font-size: 4.5rem; line-height: 1.1; margin-bottom: 20px; text-shadow: 0 10px 30px rgba(0,0,0,0.8); }
        h2 { font-size: 2.2rem; color: var(--accent); display: flex; align-items: center; gap: 15px; margin-bottom: 20px; font-family: var(--font-display);}
        p { font-size: 1.15rem; color: var(--text-dim); margin-bottom: 20px; }
        .code-tag { font-family: var(--font-body); font-weight: 800; color: var(--accent); font-size: 0.8rem; background: rgba(212, 175, 55, 0.1); padding: 4px 12px; border-radius: 4px; letter-spacing: 2px; border: 1px solid rgba(212, 175, 55, 0.2); text-transform: uppercase; display: inline-block; margin-bottom: 15px;}

        .dual-panel { display: flex; gap: 50px; align-items: center; width: 100%; }
        .dual-panel > * { flex: 1; }

        /* --- SPEAKING HUB --- */
        .speaking-hub { margin-top: 40px; padding: 30px; background: rgba(212, 175, 55, 0.05); border-radius: 12px; border: 1px solid var(--accent-glow); position: relative; }
        .speaking-hub::before { content: '🗣️ EXAMINER COMMS'; position: absolute; top: -14px; left: 30px; background: var(--accent); color: #000; font-family: var(--font-body); font-size: 0.75rem; font-weight: 900; padding: 6px 16px; border-radius: 4px; letter-spacing: 1px; box-shadow: 0 0 15px var(--accent-glow); }
        .speaking-hub p { color: #fff; font-weight: 600; font-size: 1.2rem; margin-bottom: 0; }

        /* --- CUSTOM AUDIO PLAYER UI --- */
        .custom-audio-player {
            background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 100px; padding: 15px 25px; display: flex; align-items: center; gap: 20px;
            margin-bottom: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); backdrop-filter: blur(10px);
            position: sticky; top: 0; z-index: 50;
        }
        .play-btn {
            width: 50px; height: 50px; border-radius: 50%; background: var(--accent); color: #000;
            border: none; cursor: pointer; font-size: 1.2rem; display: flex; align-items: center; justify-content: center;
            transition: 0.3s; box-shadow: 0 0 15px var(--accent-glow); flex-shrink: 0;
        }
        .play-btn:hover { transform: scale(1.1); }
        .play-btn:disabled { background: #555; color: #aaa; cursor: not-allowed; box-shadow: none; }

        .audio-progress-container { flex: 1; height: 6px; background: rgba(255,255,255,0.1); border-radius: 10px; position: relative; overflow: hidden; }
        .audio-progress-bar { position: absolute; top: 0; left: 0; height: 100%; background: var(--accent); width: 0%; transition: width 0.2s linear; }
        .time-display { font-family: var(--font-code); font-weight: 700; color: var(--accent); font-size: 0.9rem; min-width: 50px; text-align: right; }

        /* --- IELTS EXERCISE ZONE --- */
        .exercise-zone { padding: 40px; background: rgba(0,0,0,0.3); border-radius: 16px; border: 1px solid rgba(255,255,255,0.05); margin-bottom: 30px;}
        .instruction-tag { font-weight: 800; font-size: 0.85rem; color: #E50914; text-transform: uppercase; margin-bottom: 20px; display: block; letter-spacing: 1px; font-family: var(--font-code);}
        
        .form-row { margin-bottom: 25px; font-size: 1.2rem; color: #fff; line-height: 2;}
        .ielts-input {
            background: transparent; border: none; border-bottom: 2px dashed var(--text-dim);
            color: var(--accent); font-family: var(--font-code); font-size: 1.2rem;
            padding: 5px 10px; min-width: 150px; text-align: center; font-weight: 700;
            outline: none; transition: 0.3s; margin: 0 10px;
        }
        .ielts-input::placeholder { color: rgba(255,255,255,0.1); font-weight: 300; }
        .ielts-input:focus { border-bottom-color: var(--accent); background: rgba(212, 175, 55, 0.05); }
        .ielts-input.correct { border-color: var(--correct); color: var(--correct); border-bottom-style: solid; pointer-events: none; background: rgba(29, 185, 84, 0.1);}
        .ielts-input.wrong { border-color: var(--incorrect); color: var(--incorrect); border-bottom-style: solid; background: rgba(229, 9, 20, 0.1); animation: shake 0.4s; }

        /* Multiple Choice inside Exercise Zone */
        .mc-options { display: flex; flex-direction: column; gap: 10px; margin-top: 15px;}
        .mc-btn {
            background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); color: #fff;
            padding: 15px 20px; border-radius: 8px; font-size: 1.1rem; font-weight: 600; text-align: left;
            cursor: pointer; transition: 0.3s; display: flex; align-items: center; justify-content: space-between;
        }
        .mc-btn:hover { background: var(--surface-hover); border-color: var(--accent); transform: translateX(5px); }
        .mc-btn.selected { border-color: var(--accent); background: rgba(212, 175, 55, 0.1); color: var(--accent); }
        .mc-btn.correct { background: var(--correct); border-color: var(--correct); color: #000; font-weight: 800; pointer-events: none;}
        .mc-btn.correct::after { content: '\f00c'; font-family: 'Font Awesome 6 Free'; font-weight: 900; }
        .mc-btn.wrong { background: var(--incorrect); border-color: var(--incorrect); color: #fff; animation: shake 0.4s; pointer-events: none;}
        .mc-btn.wrong::after { content: '\f00d'; font-family: 'Font Awesome 6 Free'; font-weight: 900; }

        @keyframes shake { 0%, 100% { transform: translateX(0); } 25%, 75% { transform: translateX(-5px); } 50% { transform: translateX(5px); } }

        /* --- HIDDEN YOUTUBE CONTAINER --- */
        #youtube-audio-anchor { position: absolute; width: 0; height: 0; overflow: hidden; pointer-events: none; opacity: 0; }
        
        /* --- ASIDE PANELS --- */
        .whiteboard-panel { position: fixed; bottom: 110px; right: 40px; width: 450px; height: 500px; background: rgba(10,12,20,0.95); border: 1px solid var(--border); border-radius: 16px; z-index: 101; transform: translateY(120%) scale(0.9); display: flex; flex-direction: column; transition: all 0.5s cubic-bezier(0.3, 0, 0, 1); box-shadow: 0 30px 60px rgba(0,0,0,0.9); backdrop-filter: blur(30px); opacity: 0;}
        .whiteboard-panel.open { transform: translateY(0) scale(1); opacity: 1;}
        .wb-header { padding: 25px; border-bottom: 1px solid rgba(255,255,255,0.05); display: flex; justify-content: space-between; align-items: center; font-family: var(--font-display); font-size: 1rem; color: #fff; letter-spacing: 1px;}
        .wb-content { flex: 1; padding: 25px; outline: none; color: var(--accent); font-family: var(--font-code); font-size: 1.1rem; resize: none; border: none; background: transparent; line-height: 1.8;}

    </style>
</head>
<body>

    <div class="ambient-orbs">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
    </div>

    <!-- YOUTUBE HIDDEN ENGINE -->
    <div id="youtube-audio-anchor"><div id="ytplayer"></div></div>

    <header class="header">
        <div class="logo"><i class="fa-solid fa-headphones-simple" style="color:var(--accent); margin-right:8px;"></i> WOLF LABS <span>|</span> IELTS ACADEMIC</div>
        <div class="controls">
            <button class="icon-btn" onclick="toggleWhiteboard()" title="Teacher's Whiteboard"><i class="fa-solid fa-chalkboard"></i></button>
            <button class="icon-btn" onclick="toggleFullscreen()" title="Fullscreen Mode"><i class="fa-solid fa-expand"></i></button>
        </div>
        <div class="progress-container"><div class="progress-bar" id="progressBar"></div></div>
    </header>

    <main id="main-container"></main>

    <nav class="nav-bar">
        <button class="btn" style="background: transparent; border: 1px solid rgba(255,255,255,0.2); color: #fff;" id="prevBtn" onclick="prevStep()" disabled><i class="fa-solid fa-arrow-left"></i> BACK</button>
        <div style="font-family: var(--font-display); font-weight: 800; font-size: 1.1rem; color: var(--text-dim); letter-spacing: 3px;" id="step-counter">BAND 6.5+ (1/11)</div>
        <button class="btn btn-accent" id="nextBtn" onclick="nextStep()">NEXT STAGE <i class="fa-solid fa-arrow-right"></i></button>
    </nav>

    <aside class="whiteboard-panel" id="whiteboardPanel">
        <div class="wb-header"><span><i class="fa-solid fa-pen-nib" style="color:var(--accent); margin-right: 10px;"></i> Teacher's Board</span><button class="icon-btn" style="width: 35px; height: 35px; border:none; background:transparent;" onclick="toggleWhiteboard()"><i class="fa-solid fa-xmark"></i></button></div>
        <textarea class="wb-content" placeholder="> Type IELTS grammar rules, vocabulary, or corrections here..."></textarea>
    </aside>

    <!-- CARREGANDO A API DO YOUTUBE -->
    <script src="https://www.youtube.com/iframe_api"></script>

    <script>
        // --- LESSON CONTENT & TIMINGS ---
        const sectionTimings = {
            'step-3': { start: 75, end: 320, title: 'Section 1: Venue Booking' },
            'step-5': { start: 390, end: 515, title: 'Section 2: Foster Park Map' },
            'step-7': { start: 670, end: 865, title: 'Section 3: GM Food Debate' },
            'step-9': { start: 900, end: 1040, title: 'Section 4: Termite Lecture' }
        };

        const stepsData = [
            // 0: GUIDE
            `<div class="glass-panel" style="max-width: 850px; margin: 0 auto;">
                <h2><i class="fa-solid fa-user-shield"></i> Examiner Guide: The Audio Engine</h2>
                <div style="border-left: 4px solid var(--accent); padding-left: 25px; margin: 30px 0; background: rgba(212, 175, 55, 0.05); padding-top: 20px; padding-bottom: 20px; border-radius: 0 12px 12px 0;">
                    <p style="font-family: var(--font-code); color: var(--accent); margin-bottom: 10px;">/* MISSION BRIEFING */</p>
                    <p><strong>Topic:</strong> Full IELTS Listening Mock Test.</p>
                    <p><strong>Target Band:</strong> 6.5 - 7.5+</p>
                    <p><strong>Mechanics:</strong> The video is hidden. The audio is controlled directly by the interactive UI inside each section. Students must read and type simultaneously.</p>
                </div>
                <button class="btn btn-accent" onclick="this.style.display='none'; unlockPrompt('p0')"><i class="fa-solid fa-graduation-cap"></i> Initialize System</button>
                <div class="speaking-hub" id="p0" style="display:none;">
                    <p>Teacher: Ask the student to prepare their keyboard. Spelling accuracy is critical in this test.</p>
                </div>
            </div>`,
            
            // 1: HERO
            `<div class="glass-panel" style="width: 100%; background: transparent; border: none; box-shadow: none; padding: 0;">
                <div class="dual-panel" style="align-items: center;">
                    <div style="flex: 1.2;">
                        <span class="code-tag">IELTS LISTENING | FULL MOCK TEST</span>
                        <h1 style="font-size: 5rem; margin-top: 10px;">Acoustic<br>Mastery</h1>
                        <p style="font-size: 1.3rem;">Train your ears to identify distractors, map directions, and academic vocabulary under pressure. The video is gone. Just you and the audio.</p>
                        <button class="btn btn-accent" style="margin-top: 30px;" onclick="this.style.display='none'; unlockPrompt('p1')"><i class="fa-solid fa-play"></i> Enter Exam Room</button>
                    </div>
                    <div style="flex: 0.8;">
                        <div style="background: rgba(255,255,255,0.02); padding: 50px; border-radius: 24px; border: 1px solid var(--border); text-align: center; backdrop-filter: blur(10px);">
                            <i class="fa-solid fa-headphones-simple" style="font-size: 4rem; color: var(--accent); margin-bottom: 20px;"></i>
                            <h3 style="color: #fff; font-size: 2rem; font-family: var(--font-display);">Target Band: 7.0+</h3>
                            <p style="font-size: 1.1rem; margin:0; color: var(--text-dim);">Focus: Accuracy & Distractor Avoidance</p>
                        </div>
                        <div class="speaking-hub" id="p1" style="display:none; margin-top: 0;">
                            <p>Are you ready to multitask? You will need to read, listen, and type at the same time.</p>
                        </div>
                    </div>
                </div>
            </div>`,

            // 2: STRATEGY SEC 1
            `<div class="glass-panel" style="text-align: center;">
                <h2><i class="fa-solid fa-chess-knight"></i> Strategy: Section 1</h2>
                <p style="font-size: 1.2rem; margin-bottom: 30px;">Section 1 is a social transaction (booking a hotel, renting a car). It tests your ability to write <strong>names, numbers, and dates</strong>.</p>
                <div style="background: rgba(229, 9, 20, 0.1); border: 1px solid var(--incorrect); padding: 30px; border-radius: 16px; display: inline-block;">
                    <h3 style="color: var(--incorrect); font-size: 1.5rem;"><i class="fa-solid fa-triangle-exclamation"></i> The Distractor Trap</h3>
                    <p style="font-family: var(--font-code); font-size: 1.2rem; color: #fff; line-height: 1.8;">
                        "The room costs <span style="text-decoration: line-through; color: var(--text-dim);">445 dollars</span>...<br>Wait, that's the big room. Yours is <strong style="color: var(--accent);">415 dollars</strong>."
                    </p>
                </div>
                <div style="margin-top: 30px;">
                    <button class="btn btn-accent" onclick="this.style.display='none'; unlockPrompt('p2')">I am ready</button>
                </div>
                <div class="speaking-hub" id="p2" style="display:none; text-align:left;">
                    <p>Never write the very first number you hear immediately. Wait for the speaker to confirm it!</p>
                </div>
            </div>`,

            // 3: PRACTICE SEC 1
            `<div class="glass-panel" style="padding: 40px;">
                <h2><i class="fa-solid fa-phone-volume"></i> Section 1: Venue Booking</h2>
                <p>Click Play. Listen to the phone call and fill in the official form.</p>
                
                <div class="custom-audio-player">
                    <button class="play-btn" onclick="toggleAudio()"><i class="fa-solid fa-play playIcon"></i></button>
                    <div style="display:flex; flex-direction:column; flex:1;">
                        <span class="player-title" style="font-size:0.75rem; font-weight:800; letter-spacing:2px; color:var(--text-dim); margin-bottom:5px; text-transform: uppercase;">Section 1</span>
                        <div class="audio-progress-container"><div class="audio-progress-bar"></div></div>
                    </div>
                    <div class="time-display">0:00</div>
                </div>

                <div class="exercise-zone" id="ex-sec1">
                    <span class="instruction-tag">Write ONE WORD AND/OR A NUMBER for each answer.</span>
                    <h3 style="color: var(--accent); font-family: var(--font-display); font-size: 1.5rem; margin-bottom: 20px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 10px;">Meeting Room Booking</h3>
                    
                    <div class="form-row">
                        <strong>1. Street Name:</strong> 
                        The venue is on <input type="text" class="ielts-input" data-answer="gemborough" placeholder="..."> Road.
                    </div>
                    <div class="form-row">
                        <strong>2. Max Capacity:</strong> 
                        The State Room holds <input type="text" class="ielts-input" data-answer="30" placeholder="..."> people maximum.
                    </div>
                    <div class="form-row">
                        <strong>3. Colleague's Name:</strong> 
                        Contact Jenny <input type="text" class="ielts-input" data-answer="arjah" placeholder="..."> for the keys.
                    </div>

                    <button class="btn btn-accent" style="width: 100%; margin-top: 20px;" onclick="checkSectionAnswers('ex-sec1', 'p3')">Verify Answers</button>
                </div>
                <div class="speaking-hub" id="p3" style="display:none;">
                    <p>Did you catch the distractor for the Max Capacity? They talked about 15, 25, and 35 for the other room!</p>
                </div>
            </div>`,

            // 4: STRATEGY SEC 2
            `<div class="glass-panel" style="text-align: center;">
                <h2><i class="fa-solid fa-chess-knight"></i> Strategy: Section 2</h2>
                <p style="font-size: 1.2rem; margin-bottom: 30px;">Section 2 is a monologue. A guide usually explains a map or a building layout. You must follow their voice spatially.</p>
                <div style="background: rgba(255,255,255,0.03); border: 1px solid var(--border); padding: 30px; border-radius: 16px; display: inline-block;">
                    <h3 style="color: var(--accent); font-size: 1.5rem;"><i class="fa-solid fa-compass"></i> The Golden Rule</h3>
                    <p style="font-size: 1.2rem; color: #fff; margin-top: 10px;">Before the audio starts, quickly find the <strong>Entrance</strong> and the <strong>Compass (N, S, E, W)</strong> on the map.</p>
                </div>
                <div style="margin-top: 30px;">
                    <button class="btn btn-accent" onclick="this.style.display='none'; unlockPrompt('p4')">I am ready</button>
                </div>
                <div class="speaking-hub" id="p4" style="display:none; text-align:left;">
                    <p>Get ready to listen for directions: "turn left", "opposite the library", "just past the path".</p>
                </div>
            </div>`,

            // 5: PRACTICE SEC 2
            `<div class="glass-panel" style="padding: 40px;">
                <h2><i class="fa-solid fa-map-location-dot"></i> Section 2: Foster Park</h2>
                <p>Click Play. The guide is explaining the new layout. Select the correct locations.</p>
                
                <div class="custom-audio-player">
                    <button class="play-btn" onclick="toggleAudio()"><i class="fa-solid fa-play playIcon"></i></button>
                    <div style="display:flex; flex-direction:column; flex:1;">
                        <span class="player-title" style="font-size:0.75rem; font-weight:800; letter-spacing:2px; color:var(--text-dim); margin-bottom:5px; text-transform: uppercase;">Section 2</span>
                        <div class="audio-progress-container"><div class="audio-progress-bar"></div></div>
                    </div>
                    <div class="time-display">0:00</div>
                </div>

                <div class="exercise-zone" id="ex-sec2">

            // 6: STRATEGY SEC 3
            `<div class="glass-panel" style="text-align: center;">
                <h2><i class="fa-solid fa-chess-knight"></i> Strategy: Section 3</h2>
                <p style="font-size: 1.2rem; margin-bottom: 30px;">Section 3 is an academic discussion between 2 or 3 people. You must identify who agrees and who disagrees. This section loves <strong>Multiple Choice Traps</strong>.</p>

                </div>
            </div>`,

            // 7: PRACTICE SEC 3
            `<div class="glass-panel" style="padding: 40px;">
                <h2><i class="fa-solid fa-users-viewfinder"></i> Section 3: GM Food Debate</h2>
                <p>Click Play. Listen to the student and professor discuss her presentation.</p>
                
                <div class="custom-audio-player">
                    <button class="play-btn" onclick="toggleAudio()"><i class="fa-solid fa-play playIcon"></i></button>
                    <div style="display:flex; flex-direction:column; flex:1;">
                        <span class="player-title" style="font-size:0.75rem; font-weight:800; letter-spacing:2px; color:var(--text-dim); margin-bottom:5px; text-transform: uppercase;">Section 3</span>

                </div>

                <div class="exercise-zone" id="ex-sec3">
                    <span class="instruction-tag">Choose the correct letter (A, B, or C).</span>
                    
                    <div style="margin-bottom: 30px;">
                        <p style="font-size: 1.2rem; font-weight: bold; color: #fff;">6. Why did Jamie settle on the topic of GM food?</p>
                        <div class="mc-options" data-answered="false">
                            <button class="mc-btn" onclick="selectMCQ(this, false)">A) She read articles in the mainstream media.</button>
                            <button class="mc-btn" onclick="selectMCQ(this, false)">B) Her dad told her to research it.</button>

                    <div style="margin-bottom: 30px;">
                        <p style="font-size: 1.2rem; font-weight: bold; color: #fff;">7. What was Jamie disappointed about regarding her presentation?</p>
                        <div class="mc-options" data-answered="false">
                            <button class="mc-btn" onclick="selectMCQ(this, false)">A) She used too many moving graphics.</button>

                    </div>

                    <button class="btn btn-accent" style="width: 100%; margin-top: 20px;" onclick="checkSectionAnswers('ex-sec3', 'p7')">Verify Answers</button>
                </div>
                <div class="speaking-hub" id="p7" style="display:none;">
                    <p>Did you hear the synonyms? "Film" = "Movie". "Basic" = "Bare bones / Rudimentary". This is Band 7.0 listening!</p>
                </div>
            </div>`,

            // 8: STRATEGY SEC 4
            `<div class="glass-panel" style="text-align: center;">
                <h2><i class="fa-solid fa-chess-knight"></i> Strategy: Section 4</h2>
                <p style="font-size: 1.2rem; margin-bottom: 30px;">Section 4 is an academic lecture. It is fast, dense, and there are <strong>no pauses</strong> in the middle. You must follow the speaker using <strong>Signpost Words</strong>.</p>
                <div class="highlight-zone" style="text-align: left;">
                    <p style="color:var(--text-dim); font-size:1.1rem;">When the professor says:</p>
                    <p style="font-size:1.6rem; color:var(--accent); font-weight:bold; margin: 10px 0;">"If we take a closer look at the central nest structure..."</p>

                    <p>Get ready to write fast and spell correctly. Focus on the nouns.</p>

            // 9: PRACTICE SEC 4
            `<div class="glass-panel" style="padding: 40px;">
                <h2><i class="fa-solid fa-microscope"></i> Section 4: Termite Engineering</h2>

                <div class="custom-audio-player">

                    </div>
                    <div class="time-display">0:00</div>
                </div>

                <div class="exercise-zone" id="ex-sec4">
                    <span class="instruction-tag">Write ONE WORD ONLY for each answer.</span>
                    <h3 style="color: #fff; font-family: var(--font-display); font-size: 1.5rem; margin-bottom: 20px;">The Termite Mound Structure</h3>
                    
                    <div style="margin-bottom: 30px;">
                        <p style="font-weight:bold; color:var(--accent); font-size: 1.2rem; margin-bottom: 10px;">Ventilation System:</p>
                        <div class="form-row" style="margin-left: 20px;">
                            • Air is pushed down a central <input type="text" class="ielts-input" data-answer="shaft" placeholder="...">

                    </div>

                        <p style="font-weight:bold; color:var(--accent); font-size: 1.2rem; margin-bottom: 10px;">The Central Nest:</p>
                        <div class="form-row" style="margin-left: 20px;">
                            • Top area contains stored <input type="text" class="ielts-input" data-answer="wood" placeholder="...">
                        </div>

                    <p>Did you spell "shaft" and "cell" correctly? In IELTS, "sel" or "sell" would be marked as totally wrong!</p>
                </div>
            </div>`,

            // 10: END & SCORE
            `<div class="glass-panel" style="text-align: center; border: 1px solid var(--correct); background: rgba(29, 185, 84, 0.05); box-shadow: 0 0 100px rgba(29, 185, 84, 0.2);">
                <i class="fa-solid fa-award" style="font-size: 5rem; color: var(--correct); margin-bottom: 20px;"></i>
                <h1 style="color: var(--correct); font-size: 4.5rem; text-shadow: none;">Mission Logged</h1>
                <p style="font-size: 1.5rem;">IELTS Listening Masterclass Completed.</p>
                
                <div style="background: rgba(0,0,0,0.6); padding: 40px; border-radius: 20px; max-width: 600px; margin: 30px auto; text-align: center; border: 1px solid rgba(255,255,255,0.1);">
                    <p style="color:var(--text-dim); font-weight:bold; letter-spacing:2px; font-size:0.9rem;">FINAL ACCURACY</p>
                    <h2 style="font-size: 4rem; color: var(--accent); margin: 10px 0;" id="finalScoreDisplay">0 / 8</h2>
                    <p style="color:#fff; font-size: 1.1rem;">You navigated spelling traps, map directions, and academic distractors.</p>
                </div>

                <button class="btn btn-accent" style="padding: 20px 60px; font-size: 1.3rem;" onclick="alert('Data synced. Ready for Reading Module.')"><i class="fa-solid fa-upload"></i> Close Session</button>
            </div>`
        ];

        // --- AUDIO ENGINE LOGIC ---
        let player;
        let isPlaying = false;
        let audioTimer;
        
        // Define timings for each step that has a player
        const audioConfigs = {
            'step-3': { start: 75, end: 320, title: 'Section 1: Venue Booking' },
            'step-5': { start: 390, end: 515, title: 'Section 2: Foster Park Map' },
            'step-7': { start: 670, end: 865, title: 'Section 3: GM Food Debate' },
            'step-9': { start: 900, end: 1040, title: 'Section 4: Termite Lecture' }
        };
        let currentAudioConfig = null;

        function onYouTubeIframeAPIReady() {
            player = new YT.Player('ytplayer', {
                height: '10', width: '10',
                videoId: 'v3axTdVoYkY',
                playerVars: { 'playsinline': 1, 'controls': 0, 'disablekb': 1, 'rel': 0 },
                events: {
                    'onReady': onPlayerReady,
                    'onStateChange': onPlayerStateChange
                }
            });
        }

        function onPlayerReady(event) {
            console.log("Audio Engine Ready");
        }

        function toggleAudio() {
            if (!player || typeof player.getPlayerState !== 'function' || !currentAudioConfig) return;
            
            const state = player.getPlayerState();
            if (state === YT.PlayerState.PLAYING) {
                player.pauseVideo();
            } else {
                const currentTime = player.getCurrentTime();
                if(currentTime < currentAudioConfig.start || currentTime > currentAudioConfig.end) {
                    player.seekTo(currentAudioConfig.start);
                }
                player.playVideo();
            }
        }

        function onPlayerStateChange(event) {
            const activeStep = document.querySelector('.step.active');
            if(!activeStep) return;
            const icon = activeStep.querySelector('.playIcon');
            if(!icon) return;

            if (event.data === YT.PlayerState.PLAYING) {
                isPlaying = true;
                icon.className = 'fa-solid fa-pause playIcon';
                audioTimer = setInterval(updateAudioProgress, 500);
            } else {
                isPlaying = false;
                icon.className = 'fa-solid fa-play playIcon';
                clearInterval(audioTimer);
                
                if(currentAudioConfig && (event.data === YT.PlayerState.ENDED || player.getCurrentTime() >= currentAudioConfig.end)) {
                    player.seekTo(currentAudioConfig.start);
                    player.pauseVideo();
                    activeStep.querySelector('.audio-progress-bar').style.width = '0%';
                    activeStep.querySelector('.time-display').innerText = '0:00';
                }
            }
        }

        function updateAudioProgress() {
            if (!player || !currentAudioConfig) return;
            const activeStep = document.querySelector('.step.active');
            if(!activeStep) return;

            let currentSecs = player.getCurrentTime() - currentAudioConfig.start;
            if(currentSecs < 0) currentSecs = 0;
            const duration = currentAudioConfig.end - currentAudioConfig.start;
            
            let percent = (currentSecs / duration) * 100;
            if(percent > 100) percent = 100;
            
            const progressBar = activeStep.querySelector('.audio-progress-bar');
            const timeDisplay = activeStep.querySelector('.time-display');
            
            if(progressBar) progressBar.style.width = `${percent}%`;
            if(timeDisplay) {
                let mins = Math.floor(currentSecs / 60);
                let secs = Math.floor(currentSecs % 60);
                timeDisplay.innerText = `${mins}:${secs < 10 ? '0' : ''}${secs}`;
            }
            
            if(player.getCurrentTime() >= currentAudioConfig.end) {
                player.pauseVideo();
            }
        }

        function resetAudioUI() {
            if (player && typeof player.pauseVideo === 'function') player.pauseVideo();
            document.querySelectorAll('.audio-progress-bar').forEach(b => b.style.width = '0%');
            document.querySelectorAll('.time-display').forEach(d => d.innerText = '0:00');
            document.querySelectorAll('.playIcon').forEach(i => i.className = 'fa-solid fa-play playIcon');
            clearInterval(audioTimer);
        }

        // --- CORE NAVIGATION LOGIC ---
        let currentStep = 0;
        const totalSteps = stepsData.length;
        const mainContainer = document.getElementById('main-container');
        let globalScore = 0;

        function initializeSteps() {
            mainContainer.innerHTML = '';
            stepsData.forEach((htmlContent, index) => {
                const section = document.createElement('section');
                section.className = 'step';
                section.id = `step-${index}`;
                section.innerHTML = htmlContent;
                mainContainer.appendChild(section);
            });
            updateUI();
        }

        function updateUI() {
            document.querySelectorAll('.step').forEach((step, index) => {
                if(index === currentStep) step.classList.add('active');
                else step.classList.remove('active');
            });

            document.getElementById('prevBtn').disabled = currentStep === 0;
            document.getElementById('nextBtn').style.display = currentStep === totalSteps - 1 ? 'none' : 'block';
            
            const pb = document.getElementById('progressBar');
            if (pb) pb.style.width = `${((currentStep + 1) / totalSteps) * 100}%`;

            // Configure Audio Engine for current step
            const stepId = `step-${currentStep}`;
            if(audioConfigs[stepId]) {
                currentAudioConfig = audioConfigs[stepId];
                resetAudioUI();
            } else {
                currentAudioConfig = null;
                if (player && typeof player.pauseVideo === 'function') player.pauseVideo();
            }

            // Final score display
            if(currentStep === totalSteps - 1) {
                document.getElementById('finalScoreDisplay').innerText = `${globalScore} / 8`;
            }

            mainContainer.scrollTo(0, 0);
        }

        function nextStep() { if (currentStep < totalSteps - 1) { currentStep++; updateUI(); } }
        function prevStep() { if (currentStep > 0) { currentStep--; updateUI(); } }

        function unlockPrompt(id) { const el = document.getElementById(id); if(el) el.style.display = 'block'; }

        // --- EXERCISE LOGIC ---
        function selectMCQ(btn, isCorrect) {
            const parent = btn.parentElement;
            if(parent.dataset.answered === "true") return;

            parent.dataset.answered = "true";
            Array.from(parent.children).forEach(b => { if(b !== btn) b.style.opacity = '0.3'; b.style.pointerEvents = 'none'; });
            
            if(isCorrect) {
                btn.classList.add('correct');
            } else {
                btn.classList.add('wrong');
            }
            btn.dataset.selectedCorrect = isCorrect; // Store state for verify button
        }

        window.checkSectionAnswers = function(sectionId, promptId) {
            const container = document.getElementById(sectionId);
            const inputs = container.querySelectorAll('.ielts-input');
            const mcqs = container.querySelectorAll('.mc-options');
            let allGood = true;

            // Check Text Inputs
            inputs.forEach(input => {
                if(input.disabled) return;
                const val = input.value.trim().toLowerCase();
                const target = input.getAttribute('data-answer');
                if(val === target) {
                    input.classList.add('correct'); input.classList.remove('wrong'); input.disabled = true;
                    globalScore++;
                } else {
                    input.classList.add('wrong'); allGood = false;
                    setTimeout(() => input.classList.remove('wrong'), 500);
                }
            });

            // Check MCQs
            mcqs.forEach(mcq => {
                if(mcq.dataset.scored === "true") return;
                const selectedBtn = Array.from(mcq.children).find(b => b.classList.contains('correct') || b.classList.contains('wrong'));
                if(!selectedBtn) { allGood = false; return; } // Not answered yet

                if(selectedBtn.dataset.selectedCorrect === "true") {
                    globalScore++;
                }
                mcq.dataset.scored = "true";
            });

            if(allGood) {
                const verifyBtn = container.querySelector('.btn-accent');
                if(verifyBtn) {
                    verifyBtn.style.backgroundColor = 'var(--correct)';
                    verifyBtn.style.color = '#000';
                    verifyBtn.innerText = 'Answers Locked';
                    verifyBtn.style.pointerEvents = 'none';
                }
                unlockPrompt(promptId);
            }
        };

        function toggleWhiteboard() { 
            const wb = document.getElementById('whiteboardPanel');
            if(wb) wb.classList.toggle('open'); 
        }

        function toggleFullscreen() { 
            try {
                if (!document.fullscreenElement) { document.documentElement.requestFullscreen().catch(()=>{}); } 
                else { document.exitFullscreen(); }
            } catch (err) {}
        }

        window.onload = initializeSteps;
    </script>
</body>
